<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unlock | Gmail to Action Sheet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body class="auth-body">
    <main class="auth-panel">
      <p class="brand">Qorvia Systems</p>
      <h1>Unlock App</h1>
      <p class="subtitle-dark">Enter your local PIN to continue.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="messages">
            {% for category, message in messages %}
              <div class="message {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('login_post') }}" method="post" class="auth-form">
        <label>
          PIN or password
          <input type="password" name="pin" autocomplete="current-password" required />
        </label>
        <button type="submit">Unlock</button>
      </form>
    </main>
  </body>
</html>
