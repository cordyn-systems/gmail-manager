      <text x="56" y="38" fill="#1f2933" font-family="Arial" font-size="23" font-weight="700">Google credentials</text>
      <text x="56" y="72" fill="#607080" font-family="Arial" font-size="20">credentials.json found</text>
    </g>
    <g transform="translate(290 0)">
      <rect width="270" height="110" rx="8" fill="#ffffff" stroke="#dbe3ea"/>
      <circle cx="34" cy="34" r="10" fill="#12805c"/>
      <text x="56" y="38" fill="#1f2933" font-family="Arial" font-size="23" font-weight="700">Gmail connection</text>
      <text x="56" y="72" fill="#607080" font-family="Arial" font-size="20">Connected</text>
    </g>
    <g transform="translate(580 0)">
      <rect width="270" height="110" rx="8" fill="#ffffff" stroke="#dbe3ea"/>
      <circle cx="34" cy="34" r="10" fill="#12805c"/>
