  <text x="120" y="170" fill="#ddfffb" font-family="Arial" font-size="25">Turn Gmail business signals into reviewable action rows.</text>

  <g transform="translate(120 235)">
    <g>
      <rect width="270" height="110" rx="8" fill="#ffffff" stroke="#dbe3ea"/>
