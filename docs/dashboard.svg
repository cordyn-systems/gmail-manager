      <text x="56" y="72" fill="#607080" font-family="Arial" font-size="20">Sheet ID saved</text>
    </g>
    <g transform="translate(870 0)">
      <rect width="270" height="110" rx="8" fill="#ffffff" stroke="#dbe3ea"/>
      <circle cx="34" cy="34" r="10" fill="#12805c"/>
      <text x="56" y="38" fill="#1f2933" font-family="Arial" font-size="23" font-weight="700">Ollama</text>
      <text x="56" y="72" fill="#607080" font-family="Arial" font-size="20">gemma4:e4b</text>
    </g>
  </g>

  <g transform="translate(120 390)">
    <rect width="1200" height="220" rx="8" fill="#ffffff" stroke="#dbe3ea"/>
